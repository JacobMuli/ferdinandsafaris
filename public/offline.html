<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Ferdinand Safaris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: white;
            max-width: 500px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            font-weight: 700;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .button {
            display: inline-block;
            background: white;
            color: #059669;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .features {
            margin-top: 40px;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: start;
            margin-bottom: 16px;
            opacity: 0.9;
        }
        .feature-icon {
            margin-right: 12px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🦁</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry, your safari adventure awaits when you're back online!</p>
        
        <a href="/" class="button" onclick="window.location.reload()">Try Again</a>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">✓</span>
                <span>Browse previously viewed tours</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✓</span>
                <span>Access cached destination information</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✓</span>
                <span>View your saved bookings</span>
            </div>
        </div>
    </div>
</body>
</html>
